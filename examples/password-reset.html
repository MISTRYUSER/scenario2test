<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset</title>
  </head>
  <body>
    <main>
      <h1>Password Reset</h1>
      <form>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" />

        <button id="send_reset_button" type="submit">Send Reset Link</button>
      </form>
      <div id="reset_confirmation" aria-live="polite"></div>
      <div id="account_not_found_alert" aria-live="polite"></div>
      <div id="rate_limit_notice" aria-live="polite"></div>
    </main>
  </body>
</html>
