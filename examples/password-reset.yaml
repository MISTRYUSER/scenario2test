scenario:
  name: password reset flow
  description: Validate reset initiation across success, account-missing, and throttling outcomes.
  metadata:
    domain: authentication
    owner: security-qa
    base_url: http://127.0.0.1:8001
  steps:
    - id: open_reset
      action: open_page
      target: /password-reset.html
      expected: password reset page is visible
      next: input_email
    - id: input_email
      action: input
      field: email
      value: user@example.com
      next: submit_reset
    - id: submit_reset
      action: click
      target: send_reset_button
      expected: reset initiation result is returned
      branches:
        - condition: account_exists
          next: reset_sent
        - condition: account_missing
          next: account_not_found
        - condition: rate_limited
          next: throttle_notice
    - id: reset_sent
      action: view_message
      target: reset_confirmation
      expected: reset email confirmation is displayed
      type: end
    - id: account_not_found
      action: view_message
      target: account_not_found_alert
      expected: missing account guidance is displayed
      type: end
    - id: throttle_notice
      action: view_message
      target: rate_limit_notice
      expected: retry-later guidance is displayed
      type: end
  assertions:
    - type: response
      target: status_code
      value: "202"
  targets:
    password_reset_api:
      endpoint: /api/password-reset
      path: internal/auth/service.go
      symbol: RequestPasswordReset
